syntax = "proto3";

package calendar;

option go_package = "github.com/burnout-dashboard/pkg/grpc/calendar";

service CalendarService {
  rpc GetEvents (GetEventsRequest) returns (GetEventsResponse);
}

message GetEventsRequest {
  string user_id = 1;
}

message GetEventsResponse {
  repeated Event events = 1;
}

message Event {
  string id         = 1;
  string title      = 2;
  string start_time = 3;
  string end_time   = 4;
}
